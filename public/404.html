<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>DTMS</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // Saves the full URL into sessionStorage then redirects to the base,
    // so index.html can restore it after React loads.
      // Single Page App redirect for GitHub Pages.
      // Encodes the full path as a query string so index.html can restore it.
      // segmentCount = number of path segments in your GitHub Pages base path.
      // For a repo deployed at /dtms/, segmentCount = 1.
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
  </script>
</head>
<body></body>
</html>
